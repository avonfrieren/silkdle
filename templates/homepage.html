{% extends "base.html" %}
{% block content %}
    <h1 class="site-title">SilkdlE</h1>
    <div class="table-container">
      <table>
        <thead>
          <tr>
            {% for label in labels %}
              <th>{{ label }}</th>
            {% endfor %}
          </tr>
        </thead>
        <tbody>
          {% for guess in results_history %}
            <tr>
              {% for result in guess %}
                <td data-result="{{ result }}">{{ result }}</td>
              {% endfor %}
            </tr>
          {% endfor %}
        </tbody>
      </table>
    </div>

    <form action="/choose_zone" method="post">
        <select name="zone_name">
          {% for z in zones %}
            <option value="{{ z.name }}">{{ z.name }}</option>
          {% endfor %}
        </select>
        <input type="submit" value="Submit">
    </form>
{% endblock %}
