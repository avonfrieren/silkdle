{% extends "base.html" %}
{% block content %}
    <ul>
      {% for (label, results) in results_zone %}
        <li>{{ label }} : {{ results }}</li>
      {% endfor %}
    </ul>

    <form action="/choose_zone" method="post">
        <select name="zone_name">
          {% for z in zones %}
            <option value="{{ z.name }}">{{ z.name }}</option>
          {% endfor %}
        </select>
        <input type="submit" value="Submit">
    </form>
{% endblock %}
